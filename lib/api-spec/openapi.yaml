openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MyIFAPortal Financial Advisor Sales Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard overview
  - name: fna
    description: Financial Needs Analysis
  - name: policies
    description: Client policies
  - name: appointments
    description: Advisor appointments
  - name: documents
    description: Document management
  - name: advisors
    description: Financial advisors
  - name: admin-auth
    description: Admin authentication
  - name: admin-dashboard
    description: Admin dashboard
  - name: admin-advisors
    description: Admin advisor management
  - name: admin-admins
    description: Admin user management (super_admin only)
  - name: admin-fna
    description: Admin FNA management
  - name: admin-appointments
    description: Admin appointment management
  - name: admin-policies
    description: Admin policy management
  - name: admin-documents
    description: Admin document management
  - name: admin-clients
    description: Admin client management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /fna:
    get:
      operationId: listFnaSubmissions
      tags: [fna]
      summary: List FNA submissions
      responses:
        "200":
          description: List of FNA submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FnaSubmission"
    post:
      operationId: createFnaSubmission
      tags: [fna]
      summary: Submit a new FNA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FnaInput"
      responses:
        "201":
          description: FNA submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FnaSubmission"

  /fna/{id}:
    get:
      operationId: getFnaSubmission
      tags: [fna]
      summary: Get a single FNA submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: FNA submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FnaSubmission"
        "404":
          description: Not found
    patch:
      operationId: updateFnaStatus
      tags: [fna]
      summary: Update FNA status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FnaStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FnaSubmission"

  /policies:
    get:
      operationId: listPolicies
      tags: [policies]
      summary: List client policies
      responses:
        "200":
          description: List of policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Policy"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /advisors:
    get:
      operationId: listAdvisors
      tags: [advisors]
      summary: List financial advisors
      responses:
        "200":
          description: List of advisors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Advisor"

  /advisors/{id}:
    get:
      operationId: getAdvisor
      tags: [advisors]
      summary: Get a specific advisor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Advisor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Advisor"
        "404":
          description: Not found

  # ─── Admin Auth ───────────────────────────────────────────────────────────────

  /admin/auth/session:
    get:
      operationId: adminGetSession
      tags: [admin-auth]
      summary: Get current admin session
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"

  /admin/auth/login:
    post:
      operationId: adminLogin
      tags: [admin-auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials

  /admin/auth/logout:
    post:
      operationId: adminLogout
      tags: [admin-auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  # ─── Admin Dashboard ──────────────────────────────────────────────────────────

  /admin/dashboard:
    get:
      operationId: adminGetDashboard
      tags: [admin-dashboard]
      summary: Platform-wide admin dashboard stats
      responses:
        "200":
          description: Admin dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  # ─── Admin Advisors ───────────────────────────────────────────────────────────

  /admin/advisors:
    get:
      operationId: adminListAdvisors
      tags: [admin-advisors]
      summary: List all advisors
      responses:
        "200":
          description: List of advisors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAdvisor"
    post:
      operationId: adminCreateAdvisor
      tags: [admin-advisors]
      summary: Create a new advisor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAdvisorInput"
      responses:
        "201":
          description: Advisor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAdvisor"

  /admin/advisors/{id}:
    get:
      operationId: adminGetAdvisor
      tags: [admin-advisors]
      summary: Get advisor details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Advisor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAdvisor"
        "404":
          description: Not found
    patch:
      operationId: adminUpdateAdvisor
      tags: [admin-advisors]
      summary: Update advisor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAdvisorUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAdvisor"
    delete:
      operationId: adminDeleteAdvisor
      tags: [admin-advisors]
      summary: Delete advisor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Admin Admins (super_admin only) ─────────────────────────────────────────

  /admin/admins:
    get:
      operationId: adminListAdmins
      tags: [admin-admins]
      summary: List admin users (super_admin only)
      responses:
        "200":
          description: List of admins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
    post:
      operationId: adminCreateAdmin
      tags: [admin-admins]
      summary: Create admin user (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserInput"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/admins/{id}:
    patch:
      operationId: adminUpdateAdmin
      tags: [admin-admins]
      summary: Update admin user (super_admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
    delete:
      operationId: adminDeleteAdmin
      tags: [admin-admins]
      summary: Delete admin user (super_admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Admin FNA ────────────────────────────────────────────────────────────────

  /admin/fna:
    get:
      operationId: adminListFna
      tags: [admin-fna]
      summary: List all FNA submissions
      responses:
        "200":
          description: List of FNA submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FnaSubmission"

  /admin/fna/{id}:
    get:
      operationId: adminGetFna
      tags: [admin-fna]
      summary: Get FNA submission details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: FNA submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FnaSubmission"
        "404":
          description: Not found
    patch:
      operationId: adminUpdateFna
      tags: [admin-fna]
      summary: Update FNA (status, advisor assignment, notes)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminFnaUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FnaSubmission"
    delete:
      operationId: adminDeleteFna
      tags: [admin-fna]
      summary: Delete FNA submission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Admin Appointments ───────────────────────────────────────────────────────

  /admin/appointments:
    get:
      operationId: adminListAppointments
      tags: [admin-appointments]
      summary: List all appointments
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: adminCreateAppointment
      tags: [admin-appointments]
      summary: Create appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /admin/appointments/{id}:
    patch:
      operationId: adminUpdateAppointment
      tags: [admin-appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: adminDeleteAppointment
      tags: [admin-appointments]
      summary: Delete appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Admin Policies ───────────────────────────────────────────────────────────

  /admin/policies:
    get:
      operationId: adminListPolicies
      tags: [admin-policies]
      summary: List all policies
      responses:
        "200":
          description: List of policies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Policy"
    post:
      operationId: adminCreatePolicy
      tags: [admin-policies]
      summary: Create policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"

  /admin/policies/{id}:
    patch:
      operationId: adminUpdatePolicy
      tags: [admin-policies]
      summary: Update policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
    delete:
      operationId: adminDeletePolicy
      tags: [admin-policies]
      summary: Delete policy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Admin Documents ──────────────────────────────────────────────────────────

  /admin/documents:
    get:
      operationId: adminListDocuments
      tags: [admin-documents]
      summary: List all documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /admin/documents/{id}:
    patch:
      operationId: adminUpdateDocument
      tags: [admin-documents]
      summary: Update document status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: adminDeleteDocument
      tags: [admin-documents]
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Admin Clients ────────────────────────────────────────────────────────────

  /admin/clients:
    get:
      operationId: adminListClients
      tags: [admin-clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"

  /admin/clients/{id}:
    get:
      operationId: adminGetClient
      tags: [admin-clients]
      summary: Get client details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    delete:
      operationId: adminDeleteClient
      tags: [admin-clients]
      summary: Delete client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardSummary:
      type: object
      properties:
        activePolicies:
          type: integer
        upcomingAppointments:
          type: integer
        totalDocuments:
          type: integer
        accountStatus:
          type: string
        pendingFnaCount:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required:
        - activePolicies
        - upcomingAppointments
        - totalDocuments
        - accountStatus
        - pendingFnaCount
        - recentActivity

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        timestamp:
          type: string
      required:
        - id
        - type
        - description
        - timestamp

    FnaSubmission:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        dob:
          type: string
        gender:
          type: string
        smoker:
          type: string
        maritalStatus:
          type: string
        dependants:
          type: integer
        currentAge:
          type: integer
        grossMonthlyIncome:
          type: number
        netMonthlyIncome:
          type: number
        spouseIncome:
          type: number
        employmentType:
          type: string
        occupation:
          type: string
        hasGroupBenefits:
          type: string
        monthlyExpenses:
          type: number
        homeLoans:
          type: number
        vehicleFinance:
          type: number
        personalLoans:
          type: number
        creditCards:
          type: number
        otherDebts:
          type: number
        savings:
          type: number
        investments:
          type: number
        retirementFunds:
          type: number
        propertyValue:
          type: number
        existingLifeCover:
          type: number
        existingDisabilityCover:
          type: number
        existingDreadDiseaseCover:
          type: number
        targetRetirementAge:
          type: integer
        monthlyRetirementIncome:
          type: number
        currentRetirementSavings:
          type: number
        monthlyInvestmentBudget:
          type: number
        investmentGoal:
          type: string
        riskProfile:
          type: string
        investmentHorizon:
          type: integer
        priorities:
          type: string
        notes:
          type: ["string", "null"]
        status:
          type: string
        advisorId:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - firstName
        - lastName
        - email
        - phone
        - dob
        - gender
        - smoker
        - maritalStatus
        - dependants
        - currentAge
        - grossMonthlyIncome
        - netMonthlyIncome
        - spouseIncome
        - employmentType
        - occupation
        - hasGroupBenefits
        - monthlyExpenses
        - homeLoans
        - vehicleFinance
        - personalLoans
        - creditCards
        - otherDebts
        - savings
        - investments
        - retirementFunds
        - propertyValue
        - existingLifeCover
        - existingDisabilityCover
        - existingDreadDiseaseCover
        - targetRetirementAge
        - monthlyRetirementIncome
        - currentRetirementSavings
        - monthlyInvestmentBudget
        - investmentGoal
        - riskProfile
        - investmentHorizon
        - priorities
        - status
        - createdAt
        - updatedAt

    FnaInput:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        dob:
          type: string
        gender:
          type: string
        smoker:
          type: string
        maritalStatus:
          type: string
        dependants:
          type: integer
        currentAge:
          type: integer
        grossMonthlyIncome:
          type: number
        netMonthlyIncome:
          type: number
        spouseIncome:
          type: number
        employmentType:
          type: string
        occupation:
          type: string
        hasGroupBenefits:
          type: string
        monthlyExpenses:
          type: number
        homeLoans:
          type: number
        vehicleFinance:
          type: number
        personalLoans:
          type: number
        creditCards:
          type: number
        otherDebts:
          type: number
        savings:
          type: number
        investments:
          type: number
        retirementFunds:
          type: number
        propertyValue:
          type: number
        existingLifeCover:
          type: number
        existingDisabilityCover:
          type: number
        existingDreadDiseaseCover:
          type: number
        targetRetirementAge:
          type: integer
        monthlyRetirementIncome:
          type: number
        currentRetirementSavings:
          type: number
        monthlyInvestmentBudget:
          type: number
        investmentGoal:
          type: string
        riskProfile:
          type: string
        investmentHorizon:
          type: integer
        priorities:
          type: string
        notes:
          type: string
        advisorId:
          type: integer
      required:
        - firstName
        - lastName
        - email
        - phone
        - dob
        - gender
        - smoker
        - maritalStatus
        - dependants
        - currentAge
        - grossMonthlyIncome
        - netMonthlyIncome
        - spouseIncome
        - employmentType
        - occupation
        - hasGroupBenefits
        - monthlyExpenses
        - homeLoans
        - vehicleFinance
        - personalLoans
        - creditCards
        - otherDebts
        - savings
        - investments
        - retirementFunds
        - propertyValue
        - existingLifeCover
        - existingDisabilityCover
        - existingDreadDiseaseCover
        - targetRetirementAge
        - monthlyRetirementIncome
        - currentRetirementSavings
        - monthlyInvestmentBudget
        - investmentGoal
        - riskProfile
        - investmentHorizon
        - priorities

    FnaStatusUpdate:
      type: object
      properties:
        status:
          type: string
        notes:
          type: string
      required:
        - status

    Policy:
      type: object
      properties:
        id:
          type: integer
        policyNumber:
          type: string
        type:
          type: string
        clientName:
          type: string
        coverAmount:
          type: number
        premium:
          type: number
        status:
          type: string
        startDate:
          type: string
        renewalDate:
          type: ["string", "null"]
      required:
        - id
        - policyNumber
        - type
        - clientName
        - coverAmount
        - premium
        - status
        - startDate

    PolicyInput:
      type: object
      properties:
        policyNumber:
          type: string
        type:
          type: string
        clientName:
          type: string
        coverAmount:
          type: number
        premium:
          type: number
        status:
          type: string
        startDate:
          type: string
        renewalDate:
          type: string
      required:
        - policyNumber
        - type
        - clientName
        - coverAmount
        - premium
        - status
        - startDate

    PolicyUpdate:
